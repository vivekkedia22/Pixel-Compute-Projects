<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calcuator</title>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <div class="calculator">
      <div class="display">0</div>
      <div class="inputs">
        <div class="inputs-numbers">
          <button class="numbers button">1</button>
          <button class="numbers button">2</button>
          <button class="numbers button">3</button>
          <button class="numbers button">4</button>
          <button class="numbers button">5</button>
          <button class="numbers button">6</button>
          <button class="numbers button">7</button>
          <button class="numbers button">8</button>
          <button class="numbers button">9</button>
          <button class="numbers button">.</button>
          <button class="numbers button">0</button>
          <button class="numbers equals button">=</button>
        </div>
        <div class="inputs-operators">
          <button class="operators button">C</button>
          <button class="operators button">%</button>
          <button class="operators button">+</button>
          <button class="operators button">-</button>
          <button class="operators button">÷</button>
          <button class="operators button">×</button>
          <button class="operators button">Del</button>
          <button class="operators button">Exp</button>
        </div>
      </div>
    </div>
    <script src="index.js"></script>
  </body>
</html>
